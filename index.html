<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>StudyAI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
    }

    .glass {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    #messages::-webkit-scrollbar {
      width: 6px;
    }

    #messages::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 20px;
    }
  </style>
</head>

<body>

  <div class="flex h-screen">

    <!-- Sidebar -->
    <aside class="w-64 glass p-5 hidden md:block">

      <h1 class="text-3xl font-bold mb-8">
        StudyAI
      </h1>

      <nav class="space-y-4">

        <button class="w-full text-left p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition">
          Dashboard
        </button>

        <button class="w-full text-left p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition">
          Flashcards
        </button>

        <button class="w-full text-left p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition">
          Quizzes
        </button>

        <button class="w-full text-left p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition">
          AI Tutor
        </button>

      </nav>

    </aside>

    <!-- Main -->
    <main class="flex-1 flex flex-col">

      <!-- Header -->
      <header class="glass p-4 border-b border-slate-700 flex justify-between items-center">

        <div>
          <h2 class="text-2xl font-semibold">
            AI Study Assistant
          </h2>

          <p class="text-slate-400 text-sm">
            Ask questions and study smarter
          </p>
        </div>

        <button class="bg-blue-600 hover:bg-blue-500 px-4 py-2 rounded-xl transition">
          Upload Notes
        </button>

      </header>

      <!-- Chat -->
      <section class="flex-1 flex flex-col p-6 overflow-hidden">

        <!-- Messages -->
        <div
          id="messages"
          class="flex-1 overflow-y-auto space-y-4 mb-4 pr-2"
        >

          <div class="glass p-4 rounded-2xl max-w-xl">
            👋 Welcome to StudyAI. Ask me anything.
          </div>

        </div>

        <!-- Input -->
        <div class="glass p-4 rounded-2xl flex gap-3">

          <input
            id="messageInput"
            type="text"
            placeholder="Ask a question..."
            class="flex-1 bg-transparent outline-none text-white"
          />

          <button
            id="sendBtn"
            class="bg-blue-600 hover:bg-blue-500 px-5 py-2 rounded-xl transition"
          >
            Send
          </button>

        </div>

      </section>

    </main>

  </div>

  <script src="chat.js"></script>

</body>
</html>

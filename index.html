<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StudyAI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom right, #05010a, #1a0625, #2d0a3f);
      color: white;
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .active {
      background: #ec4899 !important;
    }

    #output {
      white-space: pre-wrap;
    }
  </style>
</head>

<body>

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-72 glass p-6 hidden md:block">
    <h1 class="text-4xl font-bold text-pink-400 mb-8">StudyAI</h1>

    <div class="space-y-3">
      <button class="w-full p-4 rounded-2xl bg-pink-600">AI Tutor</button>
      <button class="w-full p-4 rounded-2xl bg-zinc-900">Summaries</button>
      <button class="w-full p-4 rounded-2xl bg-zinc-900">Flashcards</button>
      <button class="w-full p-4 rounded-2xl bg-zinc-900">Quizzes</button>
    </div>
  </aside>

  <!-- Main -->
  <main class="flex-1 p-8 overflow-y-auto">

    <div class="max-w-5xl mx-auto glass p-8 rounded-3xl">

      <h1 class="text-5xl font-bold text-pink-400 mb-2">
        AI Study Assistant
      </h1>

      <p class="text-zinc-400 mb-8">
        Generate summaries, flashcards, and quizzes using AI.
      </p>

      <!-- MODE -->
      <div class="flex gap-3 mb-6">

        <button class="mode active px-5 py-3 rounded-2xl bg-zinc-800">
          Summary
        </button>

        <button class="mode px-5 py-3 rounded-2xl bg-zinc-800">
          Flashcards
        </button>

        <button class="mode px-5 py-3 rounded-2xl bg-zinc-800">
          Quiz
        </button>

      </div>

      <!-- QUIZ COUNT -->
      <div class="mb-6">
        <select id="quizCount" class="bg-zinc-900 p-3 rounded-xl">
          <option value="10">10</option>
          <option value="25">25</option>
          <option value="50">50</option>
          <option value="100">100</option>
          <option value="120">120</option>
        </select>
      </div>

      <!-- INPUT -->
      <textarea
        id="input"
        class="w-full h-52 bg-zinc-900 p-5 rounded-3xl outline-none"
        placeholder="Paste notes, PDF text, or YouTube transcript..."
      ></textarea>

      <!-- BUTTON -->
      <button
        id="btn"
        class="mt-5 bg-gradient-to-r from-pink-500 to-fuchsia-700 px-8 py-4 rounded-2xl font-bold hover:scale-105 transition"
      >
        Generate
      </button>

      <!-- OUTPUT -->
      <div id="output" class="mt-8 glass p-6 rounded-3xl min-h-[300px]">
        Result will appear here...
      </div>

    </div>

  </main>

</div>

<script src="chat.js"></script>

</body>
</html>

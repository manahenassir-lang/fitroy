```html
<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>StudyAI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(to bottom right,#05010a,#14061f,#24082f);
      color:white;
      overflow:hidden;
    }

    .glass{
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,0.08);
    }

    #messages::-webkit-scrollbar{
      width:6px;
    }

    #messages::-webkit-scrollbar-thumb{
      background:#ff4fd8;
      border-radius:20px;
    }
  </style>
</head>

<body>

<div class="flex h-screen">

  <!-- Sidebar -->
  <aside class="w-72 glass p-6 hidden md:block">

    <h1 class="text-4xl font-bold text-pink-400 mb-10">
      StudyAI
    </h1>

    <div class="space-y-4">

      <button class="w-full bg-pink-600 hover:bg-pink-500 transition p-4 rounded-2xl text-left">
        AI Tutor
      </button>

      <button class="w-full bg-zinc-900 hover:bg-zinc-800 transition p-4 rounded-2xl text-left">
        Flashcards
      </button>

      <button class="w-full bg-zinc-900 hover:bg-zinc-800 transition p-4 rounded-2xl text-left">
        Quizzes
      </button>

      <button class="w-full bg-zinc-900 hover:bg-zinc-800 transition p-4 rounded-2xl text-left">
        Summaries
      </button>

    </div>

  </aside>

  <!-- Main -->
  <main class="flex-1 p-8 overflow-y-auto">

    <div class="max-w-5xl mx-auto">

      <div class="glass rounded-3xl p-8">

        <h2 class="text-5xl font-bold text-pink-400 mb-4">
          AI Study Assistant
        </h2>

        <p class="text-zinc-400 text-lg mb-8">
          Upload notes, paste YouTube links, generate quizzes and summaries.
        </p>

        <!-- Upload -->
        <div class="glass rounded-3xl p-8 mb-8">

          <h3 class="text-2xl mb-4">
            Upload Documents
          </h3>

          <input
            type="file"
            id="fileInput"
            multiple
            class="w-full bg-zinc-900 p-4 rounded-2xl"
          >

          <p class="text-zinc-500 mt-3">
            Supports PDF, DOCX, PPTX, TXT, Images
          </p>

        </div>

        <!-- YouTube -->
        <div class="glass rounded-3xl p-8 mb-8">

          <h3 class="text-2xl mb-4">
            YouTube Link
          </h3>

          <input
            type="text"
            id="youtubeInput"
            placeholder="Paste YouTube URL..."
            class="w-full bg-zinc-900 p-4 rounded-2xl outline-none"
          >

        </div>

        <!-- Quiz Amount -->
        <div class="glass rounded-3xl p-8 mb-8">

          <h3 class="text-2xl mb-4">
            Quiz Questions
          </h3>

          <select
            id="quizAmount"
            class="bg-zinc-900 p-4 rounded-2xl"
          >
            <option>10</option>
            <option>25</option>
            <option>50</option>
            <option>100</option>
            <option>120</option>
          </select>

        </div>

        <!-- AI Input -->
        <textarea
          id="messageInput"
          placeholder="Ask AI to generate summaries, quizzes, flashcards..."
          class="w-full h-52 bg-zinc-900 p-6 rounded-3xl outline-none text-lg"
        ></textarea>

        <!-- Button -->
        <button
          id="sendBtn"
          class="mt-6 bg-gradient-to-r from-pink-500 to-fuchsia-700 hover:scale-105 transition px-10 py-5 rounded-2xl text-lg font-bold"
        >
          Generate Study Materials
        </button>

        <!-- Output -->
        <div
          id="messages"
          class="mt-10 glass rounded-3xl p-8 h-96 overflow-y-auto whitespace-pre-wrap leading-8"
        >
          👋 Welcome to StudyAI
        </div>

      </div>

    </div>

  </main>

</div>

<script src="chat.js"></script>

</body>
</html>
```
